name: Generate Folklore Video

on:
  schedule:
    - cron: '0 13 * * *'   # 1pm UTC daily — edit to fit your posting schedule
  workflow_dispatch: {}     # adds a "Run workflow" button in the Actions tab for manual runs

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate.py

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: output/*.mp4
          retention-days: 14

      - name: Save queue status back to the repo
        run: |
          git config user.name "folklore-bot"
          git config user.email "actions@users.noreply.github.com"
          git add queue.json
          git diff --staged --quiet || git commit -m "Update queue status [skip ci]"
          git push
